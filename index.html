<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- スマホ最適化のためのビューポート設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日の守護忍 ─ 五行 × Naruto 診断</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ページ全体のラッパー -->
  <div class="page-wrapper">

    <!-- ヘッダー -->
    <header class="site-header">
      <p class="site-subtitle">五行 × Naruto</p>
      <h1 class="site-title">今日の守護忍</h1>
    </header>

    <!-- メインカード -->
    <main class="card">

      <!-- 占う前の説明文 -->
      <p class="intro-text">
        生年月日を入力すると、あなた専用の守護忍が現れます。<br>
        今日の五行があなたを守護する忍を導きます。
      </p>

      <!-- [v1.4] 生年月日入力フォーム -->
      <div class="birthdate-form">
        <label class="birthdate-label" for="birthdateInput">
          あなたの生年月日
        </label>
        <input
          class="birthdate-input"
          type="date"
          id="birthdateInput"
          name="birthdate"
          aria-label="生年月日を入力してください"
          aria-describedby="inputError"
          max="2099-12-31"
        />
        <!-- 未入力エラーメッセージ（初期は非表示） -->
        <p class="input-error" id="inputError" role="alert" hidden></p>
      </div>

      <!-- 占うボタン -->
      <button class="btn-divine" id="btnDivine">
        今日の運勢を占う
      </button>

      <!-- 読み込み中インジケーター（初期は非表示） -->
      <div class="loading" id="loading" hidden>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>

      <!-- API エラーメッセージ（初期は非表示） -->
      <p class="error-msg" id="errorMsg" hidden></p>

      <!-- 結果エリア（初期は非表示・フェードインで表示） -->
      <section class="result" id="result" hidden>

        <!-- 五行バッジ -->
        <div class="gogyou-badge" id="gogyouBadge">
          <span class="gogyou-label">あなたの今日の五行</span>
          <span class="gogyou-name" id="gogyouName"></span>
        </div>

        <!-- キャラクター画像 -->
        <div class="char-image-wrap">
          <img
            class="char-image"
            id="charImage"
            src=""
            alt="守護忍の画像"
          />
        </div>

        <!-- キャラクター名（日本語） -->
        <h2 class="char-name" id="charName"></h2>

        <!-- [v1.4] 名セリフ（キャラ名の直下） -->
        <blockquote class="char-quote" id="charQuote" hidden></blockquote>

        <!-- 世界観テキスト -->
        <p class="world-text" id="worldText"></p>

        <!-- キャラクタープロフィール（所属・属性・役職など） -->
        <p class="char-profile" id="charProfile"></p>

        <!-- ラッキーカラー -->
        <div class="info-row">
          <span class="info-label">ラッキーカラー</span>
          <span class="info-value" id="luckyColor"></span>
          <!-- カラーサンプル丸 -->
          <span class="color-dot" id="colorDot"></span>
        </div>

        <!-- 開運アクション -->
        <div class="info-row action-row">
          <span class="info-label">開運アクション</span>
          <span class="info-value" id="luckyAction"></span>
        </div>

        <!-- 吉方位（風水） -->
        <div class="info-row">
          <span class="info-label">今日の吉方位</span>
          <span class="info-value" id="direction"></span>
        </div>

      </section><!-- /.result -->

    </main><!-- /.card -->

    <!-- フッター -->
    <footer class="site-footer">
      <!-- APIクレジット -->
      <p>キャラクターデータ: <a href="https://dattebayo-api.onrender.com" target="_blank" rel="noopener">Dattebayo API</a></p>
    </footer>

  </div><!-- /.page-wrapper -->

  <!-- JavaScriptファイルの読み込み（bodyの末尾に置くことでDOMが確実に存在する） -->
  <script src="script.js"></script>
</body>
</html>
